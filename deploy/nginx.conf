# Claw 数字员工 - Nginx 反向代理配置
# 放置到 /etc/nginx/sites-available/claw-daily 并创建软链接到 sites-enabled

server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名或 IP

    # 访问日志
    access_log /var/log/nginx/claw-daily-access.log;
    error_log  /var/log/nginx/claw-daily-error.log;

    # 客户端最大上传大小
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:7860;
        proxy_http_version 1.1;

        # WebSocket 支持（Gradio 需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # 禁用缓存（实时数据）
        proxy_buffering off;
    }

    # 历史报告静态目录（可选）
    location /reports/ {
        alias /home/ubuntu/AI.financial.report/data/reports/;
        autoindex on;
        autoindex_format html;
    }
}
